"1012.0" y="322" text-anchor="start" font-size="24" font-weight="760" fill="#252039"><tspan x="1012.0" dy="0">安装时从官方文档进入扩…</tspan></text><text x="964.0" y="367" text-anchor="start" font-size="17" font-weight="480" fill="#5d586e"><tspan x="964.0" dy="0">不要安装名称相似的第三方扩展</tspan></text><path d="M 1490 420 C 1536 443,1536 465,1490 487" fill="none" stroke="#b54e91" stroke-width="5" marker-end="url(#arrow)"/><rect x="78" y="475" width="1444" height="190" rx="28" fill="url(#glass)" stroke="#bad7ea" stroke-width="2"/><rect x="102" y="501" width="252" height="46" rx="23" fill="url(#blue)" opacity=".88"/><text x="228" y="533" text-anchor="middle" font-size="18" font-weight="740" fill="#2b2340"><tspan x="228" dy="0">安装完成后点击左侧Cod…→…</tspan></text><rect x="374.0" y="503" width="480" height="134" rx="18" fill="#ffffff" fill-opacity=".74" stroke="#ffffff" stroke-width="2" filter="url(#shadow)"/><circle cx="416.0" cy="541" r="22" fill="url(#blue)"/><text x="416.0" y="549" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff"><tspan x="416.0" dy="0">3</tspan></text><text x="452.0" y="542" text-anchor="start" font-size="24" font-weight="760" fill="#252039"><tspan x="452.0" dy="0">安装完成后点击左侧Co…</tspan></text><text x="404.0" y="587" text-anchor="start" font-size="17" font-weight="480" fill="#5d586e"><tspan x="404.0" dy="0">如果图标没有显示，就打开命令面板，执行</tspan><tspan x="404.0" dy="20.74">Codex:Op…</tspan></text><path d="M 862.0 570 L 922.0 570" stroke="#b54e91" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="934.0" y="503" width="480" height="134" rx="18" fill="#ffffff" fill-opacity=".74" stroke="#ffffff" stroke-width="2" filter="url(#shadow)"/><circle cx="976.0" cy="541" r="22" fill="url(#blue)"/><text x="976.0" y="549" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff"><tspan x="976.0" dy="0">4</tspan></text><text x="1012.0" y="542" text-anchor="start" font-size="24" font-weight="760" fill="#252039"><tspan x="1012.0" dy="0">登录后先打开项目文件夹</t