anchor="start" font-size="24" font-weight="760" fill="#252039"><tspan x="1012.0" dy="0">可以把它想成会议桌</tspan></text><text x="964.0" y="367" text-anchor="start" font-size="17" font-weight="480" fill="#5d586e"><tspan x="964.0" dy="0">桌面越大，一次能摊开的资料越多，但并不</tspan><tspan x="964.0" dy="20.74">代表所有资料都会…</tspan></text><path d="M 1490 420 C 1536 443,1536 465,1490 487" fill="none" stroke="#b54e91" stroke-width="5" marker-end="url(#arrow)"/><rect x="78" y="475" width="1444" height="190" rx="28" fill="url(#glass)" stroke="#bad7ea" stroke-width="2"/><rect x="102" y="501" width="252" height="46" rx="23" fill="url(#blue)" opacity=".88"/><text x="228" y="533" text-anchor="middle" font-size="18" font-weight="740" fill="#2b2340"><tspan x="228" dy="0">更大的窗口也会带来费用和…→…</tspan></text><rect x="374.0" y="503" width="480" height="134" rx="18" fill="#ffffff" fill-opacity=".74" stroke="#ffffff" stroke-width="2" filter="url(#shadow)"/><circle cx="416.0" cy="541" r="22" fill="url(#blue)"/><text x="416.0" y="549" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff"><tspan x="416.0" dy="0">3</tspan></text><text x="452.0" y="542" text-anchor="start" font-size="24" font-weight="760" fill="#252039"><tspan x="452.0" dy="0">更大的窗口也会带来费用…</tspan></text><text x="404.0" y="587" text-anchor="start" font-size="17" font-weight="480" fill="#5d586e"><tspan x="404.0" dy="0">每次都发送完整合同、整本手册和全部聊天</tspan><tspan x="404.0" dy="20.74">历史，可能既慢又贵</tspan></text><path d="M 862.0 570 L 922.0 570" stroke="#b54e91" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="934.0" y="503" width="480" height="134" rx="18" fill="#ffffff" fill-opacity=".74" stroke="#ffffff" stroke-width="2" filter="url(#shadow)"/><circle cx="976.0" cy="541" r="22" fill="url(#blue)"/><text x="976.0" y="549" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff"><tspan x="976.0" dy="0">4</tspan></text><text x="1012.0" y="542" text-anchor="start" font-size="24" font-weight="760" fill="#252039"><tspan x="1012.0" dy="0">关键环节</tspan></text><text x="964.0" y="587" text-anchor="start" font-size="17" font-weight="480" fill="#5d586e"><tspan x="964.0" dy="0">它决定能带多少上下文，但真正有效的是把</tspan><tspan x="964.0" dy="20.74">正确资料放进去，…</tspan></text><path d="M 1490 640 C 1536 663,1536 685,1490 707" fill="none" stroke="#b54e91" stroke-width="5" marker-end="url(#arrow)"/><rect x="78" y="695" width="1444" height="190" rx="28" fill="url(#glass)" stroke="#e9cabc" stroke-width="2"/><rect x="102" y="721" width="252" height="46" rx="23" fill="url(#peach)" opacity=".88"/><text x="228" y="753" text-anchor="middle" font-size="18" font-weight="740" fill="#2b2340"><tspan x="228" dy="0">长期聊天常用摘要减少占用→还…</tspan></text><rect x="374.0" y="723" width="480" height="134" rx="18" fill="#ffffff" fill-opacity=".74" stroke="#ffffff" stroke-width="2" filter="url(#shadow)"/><circle cx="416.0" cy="761" r="22" fill="url(#peach)"/><text x="416.0" y="769" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff"><tspan x="416.0" dy="0">5</tspan></text><text x="452.0" y="762" text-anchor="start" font-size="24" font-weight="760" fill="#252039"><tspan x="452.0" dy="0">长期聊天常用摘要减少占用</tspan></text><text x="404.0" y="807" text-anchor="start" font-size="17" font-weight="480" fill="#5d586e"><tspan x="404.0" dy="0">重要事实最好保存成结构化状态，例如用户</tspan><tspan x="404.0" dy="20.74">确认的日期、预算…</tspan></text><path d="M 862.0 790 L 922.0 790" stroke="#b54e91" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="934.0" y="723" width="480" height="134" rx="18" fill="#ffffff" fill-opacity=".74" stroke="#ffffff" stroke-width="2" filter="url(#shadow)"/><circle cx="976.0" cy="761" r="22" fill="url(#peach)"/><text x="976.0" y="769" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff"><tspan x="976.0" dy="0">6</tspan></text><text x="1012.0" y="762" text-anchor="start" font-size="24" font-weight="760" fill="#252039"><tspan x="1012.0" dy="0">还要区分窗口和长期记忆</tspan></text><text x="964.0" y="807" text-anchor="start