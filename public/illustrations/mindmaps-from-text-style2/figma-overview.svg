<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#fbfbff"/><stop offset=".48" stop-color="#f6f2fb"/><stop offset="1" stop-color="#eef7fb"/>
      </linearGradient>
      <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ef9bc7"/><stop offset="1" stop-color="#9d82db"/></linearGradient>
      <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#8cc7eb"/><stop offset="1" stop-color="#a29ae8"/></linearGradient>
      <linearGradient id="peach" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f3b4a8"/><stop offset="1" stop-color="#e8b8dc"/></linearGradient>
      <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ffffff" stop-opacity=".88"/><stop offset=".5" stop-color="#f4efff" stop-opacity=".65"/><stop offset="1" stop-color="#e9f6ff" stop-opacity=".74"/></linearGradient>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#6b568f" flood-opacity=".15"/></filter>
      <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="42"/></filter>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#b54e91"/></marker>
    </defs><rect width="1600" height="1000" fill="url(#bg)"/><circle cx="180" cy="170" r="190" fill="#f4add0" opacity=".18" filter="url(#soft)"/><circle cx="1370" cy="730" r="240" fill="#87c8ec" opacity=".18" filter="url(#soft)"/><text x="92" y="105" text-anchor="start" font-size="52" font-weight="760" fill="#231f38"><tspan x="92" dy="0">Figma 到底是什么</tspan></text><text x="94" y="154" text-anchor="start" font-size="23" font-weight="500" fill="#59566d"><tspan x="94" dy="0">用产品界面、组件和原型三个概念，讲明白 Figma 在设计流程里的位置。</tspan></text><rect x="78" y="255" width="1444" height="190" rx="28" fill="url(#glass)" stroke="#e8bfd7" stroke-width="2"/><rect x="102" y="281" width="252" height="46" rx="23" fill="url(#pink)" opacity=".88"/><text x="228" y="313" text-anchor="middle" font-size="18" font-weight="740" fill="#2b2340"><tspan x="228" dy="0">先理解「Figma到底是…→…</tspan></text><rect x="374.0" y="283" width="480" height="134" rx="18" fill="#ffffff" fill-opacity=".74" stroke="#ffffff" stroke-width="2" filter="url(#shadow)"/><circle cx="416.0" cy="321" r="22" fill="url(#pink)"/><text x="416.0" y="329" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff"><tspan x="416.0" dy="0">1</tspan></text><text x="452.0" y="322" text-anchor="start" font-size="24" font-weight="760" fill="#252039"><tspan x="452.0" dy="0">先理解「Figma到底…</tspan></text><text x="404.0" y="367" text-anchor="start" font-size="17" font-weight="480" fill="#5d586e"><tspan x="404.0" dy="0">它不只是把页面画漂亮，而是让设计师、产</tspan><tspan x="404.0" dy="20.74">品经理和开发者在…</tspan></text><path d="M 862.0 350 L 922.0 350" stroke="#b54e91" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="934.0" y="283" width="480" height="134" rx="18" fill="#ffffff" fill-opacity=".74" stroke="#ffffff" stroke-width="2" filter="url(#shadow)"/><circle cx="976.0" cy="321" r="22" fill="url(#pink)"/><text x="976.0" y="329" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff"><tspan x="976.0" dy="0">2</tspan></text><text x="1012.0" y="322" text-anchor="start" font-size="24" font-weight="760" fill="#252039"><tspan x="1012.0" dy="0">以餐厅预约App为例</tspan></text><text x="964.0" y="367" text-anchor="start" font-size="17" font-weight="480" fill="#5d586e"><tspan x="964.0" dy="0">首页、餐厅列表、预约确认页都可以先在F</tspan><tspan x="964.0" dy="20.74">igma里画出来</tspan></text><path d="M 1490 420 C 1536 443,1536 465,1490 487" fill="none" stroke="#b54e91" stroke-width="5" marker-end="url(#arrow)"/><rect x="78" y="475" width="1444" height="190" rx="28" fill="url(#glass)" stroke="#bad7ea" stroke-width="2"/><rect x="102" y="501" width="252" height="46" rx="23" fill="url(#blue)" opacity=".88"/><text x="228" y="533" text-anchor="middle" font-size="18" font-weight="740" fill="#2b2340"><tspan x="228" dy="0">Frame→Prototype</tspan></text><rect x="374.0" y="503" width="480" height="134" rx="18" fill="#ffffff" fill-opacity=".74" stroke="#ffffff" stroke-width="2" filter="url(#shadow)"/><circle cx="416.0" cy="541" r="22" fill="url(#blue)"/><text x="416.0" y="549" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff"><tspan x="416.0" dy="0">3</tspan></text><text x="452.0" y="542" text-anchor="start" font-size="24" font-weight="760" fill="#252039"><tspan x="452.0" dy="0">Frame</tspan></text><text x="404.0" y="587" text-anchor="start" font-size="17" font-weight="480" fill="#5d586e"><tspan x="404.0" dy="0">导航栏、按钮和餐厅卡片做成组件后，修改</tspan><tspan x="404.0" dy="20.74">一次就能同步到所…</tspan></text><path d="M 862.0 570 L 922.0 570" stroke="#b54e91" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="934.0" y="503" width="480" height="134" rx="18" fill="#ffffff" fill-opacity=".74" stroke="#ffffff" stroke-width="2" filter="url(#shadow)"/><circle cx="976.0" cy="541" r="22" fill="url(#blue)"/><text x="976.0" y="549" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff"><tspan x="976.0" dy="0">4</tspan></text><text x="1012.0" y="542" text-anchor="start" font-size="24" font-weight="760" fill="#252039"><tspan x="1012.0" dy="0">Prototype</tspan></text><text x="964.0" y="587" text-anchor="start" font-size="17" font-weight="480" fill="#5d586e"><tspan x="964.0" dy="0">给“立即预约”按钮连接到确认页，再设置</tspan><tspan x="964.0" dy="20.74">返回和切换效果，…</tspan></text><path d="M 1490 640 C 1536 663,1536 685,1490 707" fill="none" stroke="#b54e91" stroke-width="5" marker-end="url(#arrow)"/><rect x="78" y="695" width="1444" height="190" rx="28" fill="url(#glass)" stroke="#e9cabc" stroke-width="2"/><rect x="102" y="721" width="252" height="46" rx="23" fill="url(#peach)" opacity=".88"/><text x="228" y="753" text-anchor="middle" font-size="18" font-weight="740" fill="#2b2340"><tspan x="228" dy="0">Figma也方便多人协作→一…</tspan></text><rect x="374.0" y="723" width="480" height="134" rx="18" fill="#ffffff" fill-opacity=".74" stroke="#ffffff" stroke-width="2" filter="url(#shadow)"/><circle cx="416.0" cy="761" r="22" fill="url(#peach)"/><text x="416.0" y="769" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff"><tspan x="416.0" dy="0">5</tspan></text><text x="452.0" y="762" text-anchor="start" font-size="24" font-weight="760" fill="#252039"><tspan x="452.0" dy="0">Figma也方便多人协作</tspan></text><text x="404.0" y="807" text-anchor="start" font-size="17" font-weight="480" fill="#5d586e"><tspan x="404.0" dy="0">设计师调整界面，产品经理直接评论，开发</tspan><tspan x="404.0" dy="20.74">者查看尺寸、颜色…</tspan></text><path d="M 862.0 790 L 922.0 790" stroke="#b54e91" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="934.0" y="723" width="480" height="134" rx="18" fill="#ffffff" fill-opacity=".74" stroke="#ffffff" stroke-width="2" filter="url(#shadow)"/><circle cx="976.0" cy="761" r="22" fill="url(#peach)"/><text x="976.0" y="769" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff"><tspan x="976.0" dy="0">6</tspan></text><text x="1012.0" y="762" text-anchor="start" font-size="24" font-weight="760" fill="#252039"><tspan x="1012.0" dy="0">一句话总结</tspan></text><text x="964.0" y="807" text-anchor="start" font-size="17" font-weight="480" fill="#5d586e"><tspan x="964.0" dy="0">它负责在开发前把体验讲清楚，再把设计信</tspan><tspan x="964.0" dy="20.74">息交给开发实现</tspan></text><rect x="310" y="898" width="980" height="64" rx="32" fill="url(#glass)" stroke="#dcb5d3" stroke-width="2"/><text x="800" y="939" text-anchor="middle" font-size="22" font-weight="760" fill="#402b58"><tspan x="800" dy="0">先理解「Figma到底是…→以餐厅预约App为例→Frame→Prototype→Figma也方便多人协作…</tspan></text></svg>