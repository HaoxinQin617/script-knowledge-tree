 dy="0">证据更新后，也要重新测试常见问题</tspan></text><rect x="310" y="898" width="980" height="64" rx="32" fill="url(#glass)" stroke="#dcb5d3" stroke-width="2"/><text x="800" y="939" text-anchor="middle" font-size="22" font-weight="760" fill="#402b58"><tspan x="800" dy="0">公司制度昨天刚更新→建立资料库时→RAG的关键不→例如员工问差旅报销期限→评估RAG时要把检索和生…→证据…</tspan></text></svg>