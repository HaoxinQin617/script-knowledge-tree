    </defs><rect width="1600" height="1000" fill="url(#bg)"/><circle cx="180" cy="170" r="190" fill="#f4add0" opacity=".18" filter="url(#soft)"/><circle cx="1370" cy="730" r="240" fill="#87c8ec" opacity=".18" filter="url(#soft)"/><text x="92" y="105" text-anchor="start" font-size="52" font-weight="760" fill="#231f38"><tspan x="92" dy="0">RAG</tspan></text><text x="94" y="154" text-anchor="start" font-size="23" font-weight="500" fill="#59566d"><tspan x="94" dy="0">先从外部资料库找证据，再让模型依据证据组织回答。</tspan></text><rect x="78" y="255" width="1444" height="190" rx="28" fill="url(#glass)" stroke="#e8bfd7" stroke-width="2"/><rect x="102" y="281" width="252" height="46" rx="23" fill="url(#pink)" opacity=".88"/><text x="228" y="313" text-anchor="middle" font-size="18" font-weight="740" fill="#2b2340"><tspan x="228" dy="0">公司制度昨天刚更新→建立资料…</tspan></text><rect x="374.0" y="283" width="480" height="134" rx="18" fill="#ffffff" fill-opacity=".74" stroke="#ffffff" stroke-width="2" filter="url(#shadow)"/><circle cx="416.0" cy="321" r="22" fill="url(#pink)"/><text x="416.0" y="329" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff"><tspan x="416.0" dy="0">1</tspan></text><text x="452.0" y="322" text-anchor="start" font-size="24" font-weight="760" fill="#252039"><tspan x="452.0" dy="0">公司制度昨天刚更新</tspan></text><text x="404.0" y="367" text-anchor="start" font-size="17" font-weight="480" fill="#5d586e"><tspan x="404.0" dy="0">私人资料也不应该被永久训练进模型</tspan></text><path d="M 862.0 350 L 922.0 350" stroke="#b54e91" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="934.0" y="283" width="480" height="134" rx="18" fill="#ffffff" fill-opacity=".74" stroke="#ffffff" stroke-width="2" filter="url(#shadow)"/><circle cx="976.0" cy="321" r="22" fill="url(#pink)"/><text x="976.0" y="329" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff"><tspan x="976.0" dy="0">2</tspan></text><text x="1012.0" y="322" text-anchor="start" font-size="24" font-weight="760" fill="#252039"><tspan x="1012.0" dy="0">建立资料库时</tspan></text><text x="964.0" y="367" text-anchor="start" font-size="17" font-weight="480" fill="#5d586e"><tspan x="964.0" dy="0">用户提问后，先找出最相关的几段，再把问</tspan><tspan x="964.0" dy="20.74">题和段落一起放进…</tspan></text><path d="M 1490 420 C 1536 443,1536 465,1490 487" fill="none" stroke="#b54e91" stroke-width="5" marker-end="url(#arrow)"/><rect x="78" y="475" width="1444" height="190" rx="28" fill="url(#glass)" stroke="#bad7ea" stroke-width="2"/><rect x="102" y="501" width="252" height="46" rx="23" fill="url(#blue)" opacity=".88"/><text x="228" y="533" text-anchor="middle" font-size="18" font-weight="740" fill="#2b2340"><tspan x="228" dy="0">RAG的关键不→例如员工问差…</tspan></text><rect x="374.0" y="503" width="480" height="134" rx="18" fill="#ffffff" fill-opacity=".74" stroke="#ffffff" stroke-width="2" filter="url(#shadow)"/><circle cx="416.0" cy="541" r="22" fill="url(#blue)"/><text x="416.0" y="549" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff"><tspan x="416.0" dy="0">3</tspan></text><text x="452.0" y="542" text-anchor="start" font-size="24" font-weight="760" fill="#252039"><tspan x="452.0" dy="0">RAG的关键不</tspan></text><text x="404.0" y="587" text-anchor="start" font-size="17" font-weight="480" fill="#5d586e"><tspan x="404.0" dy="0">文档切得太碎会失去上下文，检索漏掉正确</tspan><tspan x="404.0" dy="20.74">段落，模型就无从…</tspan></text><path d="M 862.0 570 L 922.0 570" stroke="#b54e91" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="934.0" y="503" width="480" height="134" rx="18" fill="#ffffff" fill-opacity=".74" stroke="#ffffff" stroke-width="2" filter="url(#shadow)"/><circle cx="976.0" cy="541" r="22" fill="url(#blue)"/><text x="976.0" y="549" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff"><tspan x="976.0" dy="0">4</tspan></text><text x="1012.0" y="542" text-anchor="start" font-size="24" font-weight="760" fill="#252039"><tspan x="1012.0" dy="0">例如员工问差旅报销期限</tspan></text><text x="964.0" y="58