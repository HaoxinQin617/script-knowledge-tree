<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#fbfbff"/><stop offset=".48" stop-color="#f6f2fb"/><stop offset="1" stop-color="#eef7fb"/>
      </linearGradient>
      <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ef9bc7"/><stop offset="1" stop-color="#9d82db"/></linearGradient>
      <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#8cc7eb"/><stop offset="1" stop-color="#a29ae8"/></linearGradient>
      <linearGradient id="peach" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f3b4a8"/><stop offset="1" stop-color="#e8b8dc"/></linearGradient>
      <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ffffff" stop-opacity=".88"/><stop offset=".5" stop-color="#f4efff" stop-opacity=".65"/><stop offset="1" stop-color="#e9f6ff" stop-opacity=".74"/></linearGradient>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#6b568f" flood-opacity=".15"/></filter>
      <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="42"/></filter>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#b54e91"/></marker>
    </defs><rect width="1600" height="1000" fill="url(#bg)"/><ellipse cx="250" cy="210" rx="270" ry="190" fill="#dda6da" opacity=".22" filter="url(#soft)"/><ellipse cx="1320" cy="760" rx="300" ry="210" fill="#8fcce5" opacity=".22" filter="url(#soft)"/><rect x="52" y="42" width="1496" height="916" rx="34" fill="#ffffff" fill-opacity=".38" stroke="#ffffff" stroke-width="3"/><text x="98" y="112" text-anchor="start" font-size="52" font-weight="800" fill="#221c36"><tspan x="98" dy="0">API</tspan></text><text x="100" y="159" text-anchor="start" font-size="22" font-weight="520" fill="#555069"><tspan x="100" dy="0">软件之间约定好的服务窗口。</tspan></text><rect x="102" y="211" width="1396" height="182" rx="34" fill="url(#glass)" stroke="#ffffff" stroke-width="3" filter="url(#shadow)"/><rect x="124" y="173" width="350" height="42" rx="21" fill="url(#pink)" fill-opacity=".5"/><text x="299" y="201" text-anchor="middle" font-size="18" font-weight="760" fill="#3e3154"><tspan x="299" dy="0">两个互不认识的软件，怎样…→想象你…</tspan></text><rect x="155" y="237" width="540" height="132" rx="22" fill="url(#pink)" fill-opacity=".38" stroke="#ffffff" stroke-width="2"/><circle cx="189" cy="276" r="24" fill="url(#pink)" stroke="#ffffff" stroke-width="2"/><text x="189" y="284" text-anchor="middle" font-size="19" font-weight="820" fill="#ffffff"><tspan x="189" dy="0">1</tspan></text><text x="223" y="283" text-anchor="start" font-size="22" font-weight="800" fill="#28203d"><tspan x="223" dy="0">两个互不认识的软件…</tspan></text><text x="179" y="322" text-anchor="start" font-size="16" font-weight="520" fill="#554d68"><tspan x="179" dy="0">听起来像一项很深的技术，其实API解决的是一个朴素问题…</tspan></text><path d="M 709 303 L 887 303" stroke="#b54e91" stroke-width="7" stroke-opacity=".84" marker-end="url(#arrow)"/><rect x="905" y="237" width="540" height="132" rx="22" fill="url(#pink)" fill-opacity=".38" stroke="#ffffff" stroke-width="2"/><circle cx="939" cy="276" r="24" fill="url(#pink)" stroke="#ffffff" stroke-width="2"/><text x="939" y="284" text-anchor="middle" font-size="19" font-weight="820" fill="#ffffff"><tspan x="939" dy="0">2</tspan></text><text x="973" y="283" text-anchor="start" font-size="22" font-weight="800" fill="#28203d"><tspan x="973" dy="0">想象你去餐厅点菜</tspan></text><text x="929" y="322" text-anchor="start" font-size="16" font-weight="520" fill="#554d68"><tspan x="929" dy="0">你不会直接闯进厨房告诉每位厨师怎么切菜，而是把菜名告诉…</tspan></text><path d="M 1420 375 C 1420 430,1420 370,1420 438" fill="none" stroke="#b54e91" stroke-width="7" stroke-opacity=".84" marker-end="url(#arrow)"/><rect x="102" y="426" width="1396" height="182" rx="34" fill="url(#glass)" stroke="#ffffff" stroke-width="3" filter="url(#shadow)"/><rect x="124" y="388" width="350" height="42" rx="21" fill="url(#blue)" fill-opacity=".5"/><text x="299" y="416" text-anchor="middle" font-size="18" font-weight="760" fill="#3e3154"><tspan x="299" dy="0">一套API会规定几件事→在AI产品里</tspan></text><rect x="905" y="452" width="540" height="132" rx="22" fill="url(#blue)" fill-opacity=".38" stroke="#ffffff" stroke-width="2"/><circle cx="939" cy="491" r="24" fill="url(#blue)" stroke="#ffffff" stroke-width="2"/><text x="939" y="499" text-anchor="middle" font-size="19" font-weight="820" fill="#ffffff"><tspan x="939" dy="0">3</tspan></text><text x="973" y="498" text-anchor="start" font-size="22" font-weight="800" fill="#28203d"><tspan x="973" dy="0">一套API会规定几…</tspan></text><text x="929" y="537" text-anchor="start" font-size="16" font-weight="520" fill="#554d68"><tspan x="929" dy="0">开发者按照这些约定发出请求，不需要知道对方服务器内部怎…</tspan></text><path d="M 891 518 L 713 518" stroke="#b54e91" stroke-width="7" stroke-opacity=".84" marker-end="url(#arrow)"/><rect x="155" y="452" width="540" height="132" rx="22" fill="url(#blue)" fill-opacity=".38" stroke="#ffffff" stroke-width="2"/><circle cx="189" cy="491" r="24" fill="url(#blue)" stroke="#ffffff" stroke-width="2"/><text x="189" y="499" text-anchor="middle" font-size="19" font-weight="820" fill="#ffffff"><tspan x="189" dy="0">4</tspan></text><text x="223" y="498" text-anchor="start" font-size="22" font-weight="800" fill="#28203d"><tspan x="223" dy="0">在AI产品里</tspan></text><text x="179" y="537" text-anchor="start" font-size="16" font-weight="520" fill="#554d68"><tspan x="179" dy="0">模型生成答案后，返回一份结构化结果</tspan></text><path d="M 180 590 C 180 645,180 585,180 653" fill="none" stroke="#b54e91" stroke-width="7" stroke-opacity=".84" marker-end="url(#arrow)"/><rect x="102" y="641" width="1396" height="182" rx="34" fill="url(#glass)" stroke="#ffffff" stroke-width="3" filter="url(#shadow)"/><rect x="124" y="603" width="350" height="42" rx="21" fill="url(#peach)" fill-opacity=".5"/><text x="299" y="631" text-anchor="middle" font-size="18" font-weight="760" fill="#3e3154"><tspan x="299" dy="0">API的价值在于把复杂能…→记住这…</tspan></text><rect x="155" y="667" width="540" height="132" rx="22" fill="url(#peach)" fill-opacity=".38" stroke="#ffffff" stroke-width="2"/><circle cx="189" cy="706" r="24" fill="url(#peach)" stroke="#ffffff" stroke-width="2"/><text x="189" y="714" text-anchor="middle" font-size="19" font-weight="820" fill="#ffffff"><tspan x="189" dy="0">5</tspan></text><text x="223" y="713" text-anchor="start" font-size="22" font-weight="800" fill="#28203d"><tspan x="223" dy="0">API的价值在于把…</tspan></text><text x="179" y="752" text-anchor="start" font-size="16" font-weight="520" fill="#554d68"><tspan x="179" dy="0">地图软件通过API获取路线，支付软件通过API请求银行…</tspan></text><path d="M 709 733 L 887 733" stroke="#b54e91" stroke-width="7" stroke-opacity=".84" marker-end="url(#arrow)"/><rect x="905" y="667" width="540" height="132" rx="22" fill="url(#peach)" fill-opacity=".38" stroke="#ffffff" stroke-width="2"/><circle cx="939" cy="706" r="24" fill="url(#peach)" stroke="#ffffff" stroke-width="2"/><text x="939" y="714" text-anchor="middle" font-size="19" font-weight="820" fill="#ffffff"><tspan x="939" dy="0">6</tspan></text><text x="973" y="713" text-anchor="start" font-size="22" font-weight="800" fill="#28203d"><tspan x="973" dy="0">记住这句话就够了</tspan></text><text x="929" y="752" text-anchor="start" font-size="16" font-weight="520" fill="#554d68"><tspan x="929" dy="0">它负责把请求送进去、把结果带回来</tspan></text><rect x="255" y="876" width="1090" height="58" rx="29" fill="url(#glass)" stroke="#d4b2d0" stroke-width="2"/><text x="800" y="914" text-anchor="middle" font-size="22" font-weight="780" fill="#3d2854"><tspan x="800" dy="0">两个互不认识的软件，怎样…→想象你去餐厅点菜→一套API会规定几件事→在AI产品里→API的价值在于把复杂能…→记…</tspan></text></svg>