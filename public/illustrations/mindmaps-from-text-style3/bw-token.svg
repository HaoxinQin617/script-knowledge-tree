    </defs><rect width="1600" height="1000" fill="url(#bg)"/><ellipse cx="250" cy="210" rx="270" ry="190" fill="#dda6da" opacity=".22" filter="url(#soft)"/><ellipse cx="1320" cy="760" rx="300" ry="210" fill="#8fcce5" opacity=".22" filter="url(#soft)"/><rect x="52" y="42" width="1496" height="916" rx="34" fill="#ffffff" fill-opacity=".38" stroke="#ffffff" stroke-width="3"/><text x="98" y="112" text-anchor="start" font-size="52" font-weight="800" fill="#221c36"><tspan x="98" dy="0">Token</tspan></text><text x="100" y="159" text-anchor="start" font-size="22" font-weight="520" fill="#555069"><tspan x="100" dy="0">模型读取和生成文字时使用的切分单位，也是常见计费单位。</tspan></text><rect x="102" y="211" width="1396" height="182" rx="34" fill="url(#glass)" stroke="#ffffff" stroke-width="3" filter="url(#shadow)"/><rect x="124" y="173" width="350" height="42" rx="21" fill="url(#pink)" fill-opacity=".5"/><text x="299" y="201" text-anchor="middle" font-size="18" font-weight="760" fill="#3e3154"><tspan x="299" dy="0">先理解「Token」→可以把它想成…</tspan></text><rect x="155" y="237" width="540" height="132" rx="22" fill="url(#pink)" fill-opacity=".38" stroke="#ffffff" stroke-width="2"/><circle cx="189" cy="276" r="24" fill="url(#pink)" stroke="#ffffff" stroke-width="2"/><text x="189" y="284" text-anchor="middle" font-size="19" font-weight="820" fill="#ffffff"><tspan x="189" dy="0">1</tspan></text><text x="223" y="283" text-anchor="start" font-size="22" font-weight="800" fill="#28203d"><tspan x="223" dy="0">先理解「Token」</tspan></text><text x="179" y="322" text-anchor="start" font-size="16" font-weight="520" fill="#554d68"><tspan x="179" dy="0">模型在计算前会把文字切成细小片段，一个汉字、标点、英文…</tspan></text><path d="M 709 303 L 887 303" stroke="#b54e91" stroke-width="7" stroke-opacity=".84" marker-end="url(#arrow)"/><rect x="905" y="237" width="540" height="132" rx="22" fill="url(#pink)" fill-opacity=".38" stroke="#ffffff" stroke-width="2"/><circle cx="939" cy="276" r="24" fill="url(#pink)" stroke="#ffffff" stroke-width="2"/><text x="939" y="284" text-anchor="middle" font-size="19" font-weight="820" fill="#ffffff"><tspan x="939" dy="0">2</tspan></text><text x="973" y="283" text-anchor="start" font-size="22" font-weight="800" fill="#28203d"><tspan x="973" dy="0">可以把它想成快递的…</tspan></text><text x="929" y="322" text-anchor="start" font-size="16" font-weight="520" fill="#554d68"><tspan x="929" dy="0">你寄的是一本书还是一箱零件并不重要，系统会按自己的单位…</tspan></text><path d="M 1420 375 C 1420 430,1420 370,1420 438" fill="none" stroke="#b54e91" stroke-width="7" stroke-opacity=".84" marker-end="url(#arrow)"/><rect x="102" y="426" width="1396" height="182" rx="34" fill="url(#glass)" stroke="#ffffff" stroke-width="3" filter="url(#shadow)"/><rect x="124" y="388" width="350" height="42" rx="21" fill="url(#blue)" fill-opacity=".5"/><text x="299" y="416" text-anchor="middle" font-size="18" font-weight="760" fill="#3e3154"><tspan x="299" dy="0">Token还决定Cont…→关键环节</tspan></text><rect x="905" y="452" width="540" height="132" rx="22" fill="url(#blue)" fill-opacity=".38" stroke="#ffffff" stroke-width="2"/><circle cx="939" cy="491" r="24" fill="url(#blue)" stroke="#ffffff" stroke-width="2"/><text x="939" y="499" text-anchor="middle" font-size="19" font-weight="820" fill="#ffffff"><tspan x="939" dy="0">3</tspan></text><text x="973" y="498" text-anchor="start" font-size="22" font-weight="800" fill="#28203d"><tspan x="973" dy="0">Token还决定C…</tspan></text><text x="929" y="537" text-anchor="start" font-size="16" font-weight="520" fill="#554d68"><tspan x="929" dy="0">内容总量超过限制时，系统要做摘要、删除旧记录或只检索相…</tspan></text><path d="M 891 518 L 713 518" stroke="#b54e91" stroke-width="7" stroke-opacity=".84" marker-end="url(#arrow)"/><rect x="155" y="452" width="540" height="132" rx="22" fill="url(#blue)" fill-opacity=".38" stroke="#ffffff" stroke-width="2"/><circle cx="189" cy="491" r="24" fill="url(#blue)" stroke="#ffffff" stroke-width="2"/><text x="189" y="499" text-anchor="middle" font-size="19" font-weight="820" fill="#ffffff"><tspan x="189" dy="0">4</tspan></text><text x="223" y="498" text-anchor="start" font-size="22" font-weight="800" fill="#28203d"><tspan x="223" dy="0">关键环节</tspan></text><text x="179" y="537" text-anchor="start" font-size="16" font-weight="520" fill="#554d68"><tspan x="179" dy="0">它同时影响费用、速度和一次能看到的内容长度</tspan></text><path d="M 180 590 C 180 645,180 585,180 653" fill="none" stroke="#b54e91" stroke-width="7" stroke-opacity=".84" marker-end="url(#arrow)"/><rect x="102" y="641" width="1396" height="182" rx="34" fill="url(#glass)" stroke="#ffffff" stroke-width="3" filter="url(#shadow)"/><rect x="124" y="603" width="350" height="42" rx="21" fill="url(#peach)" fill-opacity=".5"/><text x="299" y="631" text-anchor="middle" font-size="18" font-weight="760" fill="#3e3154"><tspan x="299" dy="0">控制Token也不能只追…→监控T…</tspan></text><rect x="155" y="667" width="540" height="132" rx="22" fill="url(#peach)" fill-opacity=".38" stroke="#ffffff" stroke-width="2"/><circle cx="189" cy="706" r="24" fill="url(#peach)" stroke="#ffffff" stroke-width="2"/><text x="189" y="714" text-anchor="middle" font-size="19" font-weight="820" fill="#ffffff"><tspan x="189" dy="0">5</tspan></text><text x="223" y="713" text-anchor="start" font-size="22" font-weight="800" fill="#28203d"><tspan x="223" dy="0">控制Token也不…</tspan></text><text x="179" y="752" text-anchor="start" font-size="16" font-weight="520" fill="#554d68"><tspan x="179" dy="0">把必要定义、限制条件和证据删掉，回答可能更便宜却不可靠</tspan></text><path d="M 709 733 L 887 733" stroke="#b54e91" stroke-width="7" stroke-opacity=".84" marker-end="url(#arrow)"/><rect x="905" y="667" width="540" height="132" rx="22" fill="url(#peach)" fill-opacity=".38" stroke="#ffffff" stroke-width="2"/><circle cx="939" cy="706" r="24" fill="url(#peach)" stroke="#ffffff" stroke-width="2"/><text x="939" y="714" text-anchor="middle" font-size="19" font-weight="820" fill="#ffffff"><tspan x="939" dy="0">6</tspan></text><text x="973" y="713" text-anchor="start" font-size="22" font-weight="800" fill="#28203d"><tspan x="973" dy="0">监控Token时应…</tspan></text><text x="929" y="752" text-anchor="start" font-size="16" font-weight="520" fill="#554d68"><tspan x="929" dy="0">一次请求很便宜，不代表每天几十万次仍然便宜</tspan></text><rect x="255" y="876" width="1090" height="58" rx="29" fill="url(#glass)" stroke="#d4b2d0" stroke-width="2"/><text x="800" y="914" text-anchor="middle" font-size="22" font-weight="780" fill="#3d2854"><tspan x="800" dy="0">先理解「Token」→可以把它想成快递的计费重量→Token还决定Cont…→关键环节→控制Token也不能只追……</tspan></text></svg>