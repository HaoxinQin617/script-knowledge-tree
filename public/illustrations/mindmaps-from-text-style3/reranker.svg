    </defs><rect width="1600" height="1000" fill="url(#bg)"/><ellipse cx="250" cy="210" rx="270" ry="190" fill="#dda6da" opacity=".22" filter="url(#soft)"/><ellipse cx="1320" cy="760" rx="300" ry="210" fill="#8fcce5" opacity=".22" filter="url(#soft)"/><rect x="52" y="42" width="1496" height="916" rx="34" fill="#ffffff" fill-opacity=".38" stroke="#ffffff" stroke-width="3"/><text x="98" y="112" text-anchor="start" font-size="52" font-weight="800" fill="#221c36"><tspan x="98" dy="0">Reranker</tspan></text><text x="100" y="159" text-anchor="start" font-size="22" font-weight="520" fill="#555069"><tspan x="100" dy="0">对初步搜索结果进行第二次精细排序。</tspan></text><rect x="102" y="211" width="1396" height="182" rx="34" fill="url(#glass)" stroke="#ffffff" stroke-width="3" filter="url(#shadow)"/><rect x="124" y="173" width="350" height="42" rx="21" fill="url(#pink)" fill-opacity=".5"/><text x="299" y="201" text-anchor="middle" font-size="18" font-weight="760" fill="#3e3154"><tspan x="299" dy="0">资料库第一次搜索完成后→从几万本书…</tspan></text><rect x="155" y="237" width="540" height="132" rx="22" fill="url(#pink)" fill-opacity=".38" stroke="#ffffff" stroke-width="2"/><circle cx="189" cy="276" r="24" fill="url(#pink)" stroke="#ffffff" stroke-width="2"/><text x="189" y="284" text-anchor="middle" font-size="19" font-weight="820" fill="#ffffff"><tspan x="189" dy="0">1</tspan></text><text x="223" y="283" text-anchor="start" font-size="22" font-weight="800" fill="#28203d"><tspan x="223" dy="0">资料库第一次搜索完…</tspan></text><text x="179" y="322" text-anchor="start" font-size="16" font-weight="520" fill="#554d68"><tspan x="179" dy="0">Reranker就是在这个时候出场的复排模型</tspan></text><path d="M 709 303 L 887 303" stroke="#b54e91" stroke-width="7" stroke-opacity=".84" marker-end="url(#arrow)"/><rect x="905" y="237" width="540" height="132" rx="22" fill="url(#pink)" fill-opacity=".38" stroke="#ffffff" stroke-width="2"/><circle cx="939" cy="276" r="24" fill="url(#pink)" stroke="#ffffff" stroke-width="2"/><text x="939" y="284" text-anchor="middle" font-size="19" font-weight="820" fill="#ffffff"><tspan x="939" dy="0">2</tspan></text><text x="973" y="283" text-anchor="start" font-size="22" font-weight="800" fill="#28203d"><tspan x="973" dy="0">从几万本书里快速抱…</tspan></text><text x="929" y="322" text-anchor="start" font-size="16" font-weight="520" fill="#554d68"><tspan x="929" dy="0">速度很快，但里面可能有书名相似、内容却不对的书</tspan></text><path d="M 1420 375 C 1420 430,1420 370,1420 438" fill="none" stroke="#b54e91" stroke-width="7" stroke-opacity=".84" marker-end="url(#arrow)"/><rect x="102" y="426" width="1396" height="182" rx="34" fill="url(#glass)" stroke="#ffffff" stroke-width="3" filter="url(#shadow)"/><rect x="124" y="388" width="350" height="42" rx="21" fill="url(#blue)" fill-opacity=".5"/><text x="299" y="416" text-anchor="middle" font-size="18" font-weight="760" fill="#3e3154"><tspan x="299" dy="0">常见流程→复排效果依赖候选质量</tspan></text><rect x="905" y="452" width="540" height="132" rx="22" fill="url(#blue)" fill-opacity=".38" stroke="#ffffff" stroke-width="2"/><circle cx="939" cy="491" r="24" fill="url(#blue)" stroke="#ffffff" stroke-width="2"/><text x="939" y="499" text-anchor="middle" font-size="19" font-weight="820" fill="#ffffff"><tspan x="939" dy="0">3</tspan></text><text x="973" y="498" text-anchor="start" font-size="22" font-weight="800" fill="#28203d"><tspan x="973" dy="0">常见流程</tspan></text><text x="929" y="537" text-anchor="start" font-size="16" font-weight="520" fill="#554d68"><tspan x="929" dy="0">的生成模型只阅读这些高质量片段</tspan></text><path d="M 891 518 L 713 518" stroke="#b54e91" stroke-width="7" stroke-opacity=".84" marker-end="url(#arrow)"/><rect x="155" y="452" width="540" height="132" rx="22" fill="url(#blue)" fill-opacity=".38" stroke="#ffffff" stroke-width="2"/><circle cx="189" cy="491" r="24" fill="url(#blue)" stroke="#ffffff" stroke-width="2"/><text x="189" y="499" text-anchor="middle" font-size="19" font-weight="820" fill="#ffffff"><tspan x="189" dy="0">4</tspan></text><text x="223" y="498" text-anchor="start" font-size="22" font-weight="800" fill="#28203d"><tspan x="223" dy="0">复排效果依赖候选质量</tspan></text><text x="179" y="537" text-anchor="start" font-size="16" font-weight="520" fill="#554d68"><tspan x="179" dy="0">次检索完全漏掉正确段落，Reranker无法凭空把它找…</tspan></text><path d="M 180 590 C 180 645,180 585,180 653" fill="none" stroke="#b54e91" stroke-width="7" stroke-opacity=".84" marker-end="url(#arrow)"/><rect x="102" y="641" width="1396" height="182" rx="34" fill="url(#glass)" stroke="#ffffff" stroke-width="3" filter="url(#shadow)"/><rect x="124" y="603" width="350" height="42" rx="21" fill="url(#peach)" fill-opacity=".5"/><text x="299" y="631" text-anchor="middle" font-size="18" font-weight="760" fill="#3e3154"><tspan x="299" dy="0">比较加入复排前后，正确证…→关键环节</tspan></text><rect x="155" y="667" width="540" height="132" rx="22" fill="url(#peach)" fill-opacity=".38" stroke="#ffffff" stroke-width="2"/><circle cx="189" cy="706" r="24" fill="url(#peach)" stroke="#ffffff" stroke-width="2"/><text x="189" y="714" text-anchor="middle" font-size="19" font-weight="820" fill="#ffffff"><tspan x="189" dy="0">5</tspan></text><text x="223" y="713" text-anchor="start" font-size="22" font-weight="800" fill="#28203d"><tspan x="223" dy="0">比较加入复排前后，…</tspan></text><text x="179" y="752" text-anchor="start" font-size="16" font-weight="520" fill="#554d68"><tspan x="179" dy="0">若准确率没有明显改善，却增加了等待和费用，就不该因为名…</tspan></text><path d="M 709 733 L 887 733" stroke="#b54e91" stroke-width="7" stroke-opacity=".84" marker-end="url(#arrow)"/><rect x="905" y="667" width="540" height="132" rx="22" fill="url(#peach)" fill-opacity=".38" stroke="#ffffff" stroke-width="2"/><circle cx="939" cy="706" r="24" fill="url(#peach)" stroke="#ffffff" stroke-width="2"/><text x="939" y="714" text-anchor="middle" font-size="19" font-weight="820" fill="#ffffff"><tspan x="939" dy="0">6</tspan></text><text x="973" y="713" text-anchor="start" font-size="22" font-weight="800" fill="#28203d"><tspan x="973" dy="0">关键环节</tspan></text><text x="929" y="752" text-anchor="start" font-size="16" font-weight="520" fill="#554d68"><tspan x="929" dy="0">它是搜索结果的第二轮面试官，能提高准确性，但不能挽救第…</tspan></text><rect x="255" y="876" width="1090" height="58" rx="29" fill="url(#glass)" stroke="#d4b2d0" stroke-width="2"/><text x="800" y="914" text-anchor="middle" font-size="22" font-weight="780" fill="#3d2854"><tspan x="800" dy="0">资料库第一次搜索完成后→从几万本书里快速抱来二十本→常见流程→复排效果依赖候选质量→比较加入复排前后，正确证…→关…</tspan></text></svg>